services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: Cooking
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      POSTGRES_DB: CookingDB
    volumes:
      - cook_pg_data:/var/lib/postgresql/data
      - ./database/postgresql_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U Cooking -d CookingDB']
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: '3001'
      DB_HOST: db
      DB_PORT: '5432'
      DB_USER: Cooking
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: CookingDB
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env.docker}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-CookingWeb <noreply@localhost>}
      MAIL_BRAND: ${MAIL_BRAND:-CookingWeb}
      AI_API_KEY: ${AI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/api/healthz').then(r=>r.json()).then(j=>process.exit(j.ok===true?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    ports:
      - '${HTTP_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  cook_pg_data:
